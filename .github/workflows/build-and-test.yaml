name: Build and test addon

on: [push]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Set up Python 3.7
      uses: actions/setup-python@v4
      with:
        python-version: 3.7
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install scons
        pip install Markdown
        pip install flake8
        pip install flake8-tabs
    - name: Lint with flake8
      run:
        flake8 --config .github/extra_resources/setup.cfg --exit-zero addon
        # stop the build if there are Python syntax errors or undefined names
        # flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        # flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Build add-on
      run: scons
    - name: Copy addon
      run: |
        move *.nvda-addon addon.zip
        expand-archive addon.zip $env:appdata\nvda\addons\addon
    - name: Download NVDA
      run: curl --location --output stable.exe https://www.nvaccess.org/download/nvda/releases/2023.1/nvda_2023.1.exe
    - name: Install NVDA
      run: stable.exe --install-silent
      shell: cmd
    - name: Create a configuration file
      run: |
        $config = @'
        [update]
        allowUsageStats = False
        askedAllowUsageStats = True
        autoCheck = False
        [general]
        showWelcomeDialogAtStartup = False
        [speech]
        synth = silence
        '@
        echo $config > $env:APPDATA\nvda\nvda.ini
    - name: Check config
      run: |
        type %appdata%\nvda\nvda.ini
      shell: cmd
    - name: start nvda
      run: start nvda -m -f %TEMP%\nvda-with-addon.log --debug-logging
      shell: cmd
    - name: Quit NVDA
      run: start nvda -q
      shell: cmd
    - name: get the log file from temp directory
      shell: cmd
      run: |
        ping 192.0.2.0 -n 1 -w 10000 > nul
        copy %TEMP%\nvda-with-addon.log nvda.log
    - name: Upload NVDA's log
      uses: actions/upload-artifact@v3
      with:
        name: nvda.log
        path: nvda.log
